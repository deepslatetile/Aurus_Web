<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#0D2064"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Aurus">
    <link rel="apple-touch-icon" href="/static/images/icon-192x192.png">
    <title>Aurus</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles/base.css">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-messaging-compat.js"></script>

    {% block extra_css %}{% endblock %}
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="nav-container">
            <div class="logo">
                <a href="/">
                    <img class="header_img" src="/static/images/logo_white.png" alt="Aurus">
                </a>
            </div>

            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <i class="fas fa-bars"></i>
            </button>

            <ul class="nav-menu" id="navMenu">
                <!-- Navigation will be loaded by base.js -->
            </ul>

            <div class="auth-buttons" id="authButtons">
                <!-- Auth buttons will be loaded by base.js -->
            </div>

            <div class="mobile-dropdown" id="mobileDropdown">
                <ul class="mobile-dropdown-menu" id="mobileDropdownMenu">
                    <!-- Mobile navigation will be loaded by base.js -->
                </ul>
            </div>
        </nav>
    </div>
</header>

<main class="main-content">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; 2025 Aurus. All rights reserved.</p>
        <div class="footer-links">
            <a href="/tos">Terms of service</a>
            <a href="/privacy-policy">Privacy Policy</a>
        </div>
    </div>
</footer>

<script src="/static/js/base.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
